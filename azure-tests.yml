trigger: none

parameters:
- name: testSuite
  displayName: Test Suite
  type: string
  default: Unit Tests
  values:
    - Unit Tests
    - E2E — Smoke
    - E2E — Sanity
    - E2E — Regression (Full)
    - Full Suite (Unit + E2E)

pool:
  vmImage: ubuntu-latest

container:
  # Pinada por tag imutável (ver racional em azure-pipelines.yml). Bump consciente
  # ao adotar uma imagem nova — nunca ':latest'.
  image: gustavobfonseca/ireport-builder:1.1.12
  options: --pull always

variables:
  WORKING_DIR: desktop
  # Criamos uma pasta explícita que o container do Docker consegue ler/gravar sem problemas de permissão
  PLAYWRIGHT_BROWSERS_PATH: $(Pipeline.Workspace)/ms-playwright-browsers
  CARGO_HOME: $(Pipeline.Workspace)/.cargo
  # Detecta se executaremos testes E2E: true para E2E — *, Full Suite
  RUN_E2E: $[or(startsWith(parameters.testSuite, 'E2E'), eq(parameters.testSuite, 'Full Suite (Unit + E2E)'))]

steps:

- checkout: self

- script: |
    echo "=== Executando: $(TestSuite) ==="
    echo "Executará E2E: $(RUN_E2E)"
  displayName: 'Show Test Configuration'
  env:
    TestSuite: ${{ parameters.testSuite }}

# 1. Cache do npm (Padrão para acelerar o npm ci)
- task: Cache@2
  displayName: 'Cache npm'
  inputs:
    key: 'npm | "$(Agent.OS)" | $(WORKING_DIR)/package-lock.json'
    restoreKeys: |
      npm | "$(Agent.OS)"
    path: $(Pipeline.Workspace)/.npm

# 2. Cache dos binários do Playwright (somente para E2E)
- task: Cache@2
  displayName: 'Cache Playwright Browsers'
  condition: eq(variables.RUN_E2E, 'true')
  inputs:
    key: 'playwright | "$(Agent.OS)" | $(WORKING_DIR)/package-lock.json'
    restoreKeys: |
      playwright | "$(Agent.OS)"
    path: $(PLAYWRIGHT_BROWSERS_PATH)

# 3. Cache do Cargo Registry
- task: Cache@2
  displayName: 'Cache Cargo Registry'
  inputs:
    key: 'cargo-registry | "$(Agent.OS)" | $(WORKING_DIR)/src-tauri/Cargo.lock'
    restoreKeys: |
      cargo-registry | "$(Agent.OS)"
    path: $(CARGO_HOME)/registry

# 4. Instalação de Dependências
- script: |
    set -e

    npm config set cache $(Pipeline.Workspace)/.npm
    npm ci

    echo "npm dependencies installed"
  workingDirectory: $(WORKING_DIR)
  displayName: 'Install npm dependencies'
  env:
    NPM_CONFIG_CACHE: $(Pipeline.Workspace)/.npm

# 5. Baixar Binários do Playwright (apenas se E2E)
- script: |
    set -e
    export PLAYWRIGHT_BROWSERS_PATH=$(PLAYWRIGHT_BROWSERS_PATH)
    npx playwright install chromium
    echo "Playwright Chromium downloaded"
  workingDirectory: $(WORKING_DIR)
  displayName: 'Download Playwright Browsers'
  condition: eq(variables.RUN_E2E, 'true')
  env:
    PLAYWRIGHT_BROWSERS_PATH: $(PLAYWRIGHT_BROWSERS_PATH)

# 6. Execução dos Testes Selecionados
- script: |
    set -e

    export PLAYWRIGHT_BROWSERS_PATH=$(PLAYWRIGHT_BROWSERS_PATH)
    SUITE='${{ parameters.testSuite }}'

    echo "=== Suite: $SUITE ==="

    case "$SUITE" in
      "Unit Tests")
        echo "Running: Unit Tests"
        npm run lint
        npm run format:check
        npm run test:coverage
        (cd ../src-tauri && cargo clippy --all-targets && cargo test --locked)
        ;;

      "E2E — Smoke")
        echo "Running: E2E Smoke Tests"
        npx playwright test --grep "@smoke"
        ;;

      "E2E — Sanity")
        echo "Running: E2E Sanity Tests"
        npx playwright test --grep "@sanity"
        ;;

      "E2E — Regression (Full)")
        echo "Running: E2E Regression Tests"
        npx playwright test --grep "@regression"
        ;;

      "Full Suite (Unit + E2E)")
        echo "Running: Full Suite (Unit + E2E)"
        npm run lint
        npm run format:check
        npm run test:coverage
        (cd ../src-tauri && cargo clippy --all-targets && cargo test --locked)
        npx playwright test --grep "@regression"
        ;;

      *)
        echo "❌ Unknown test suite: $SUITE"
        exit 1
        ;;
    esac
  workingDirectory: $(WORKING_DIR)
  displayName: 'Execute Tests'
  env:
    PLAYWRIGHT_BROWSERS_PATH: $(PLAYWRIGHT_BROWSERS_PATH)
    CARGO_HOME: $(CARGO_HOME)

# 7. Publish Playwright Report (sempre que houver, mesmo em falha)
- task: PublishPipelineArtifact@1
  displayName: 'Publish Playwright Report'
  condition: succeededOrFailed()
  inputs:
    targetPath: '$(WORKING_DIR)/playwright-report'
    artifact: 'playwright-report'
    publishLocation: 'pipeline'

# 8. Publish Coverage Report (sempre que houver, mesmo em falha)
- task: PublishPipelineArtifact@1
  displayName: 'Publish Coverage Report'
  condition: succeededOrFailed()
  inputs:
    targetPath: '$(WORKING_DIR)/coverage'
    artifact: 'coverage-report'
    publishLocation: 'pipeline'